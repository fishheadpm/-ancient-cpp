<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古文助動詞アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="card">
      <h1>古文助動詞アプリ</h1>
      <p class="sub">助動詞の活用と意味を確認する学習アプリ</p>
    </header>

    <main>
      <section id="titleScreen" class="card">
        <h2>タイトル</h2>
        <div class="button-group vertical">
          <button id="startFromBeginningButton">最初から</button>
          <button id="continueButton">続きから</button>
          <button id="historyButton">間違えた履歴</button>
        </div>
      </section>

      <section id="quizScreen" class="card hidden">
        <div class="quiz-top">
          <p id="progressLabel" class="progress-label"></p>
        </div>

        <div class="question-area">
          <div id="questionVertical" class="vertical-question"></div>
        </div>

        <div id="beforeRevealArea" class="button-group vertical">
          <button id="showAnswerButton">正解を表示</button>
          <button id="backToTitleFromQuizButton" class="secondary">タイトルに戻る</button>
        </div>

        <div id="answerArea" class="answer-area hidden">
          <div class="answer-box vertical-answer-box">
            <div class="answer-column">
              <div class="answer-label">変格活用</div>
              <div id="answerConjugation" class="vertical-answer-text"></div>
            </div>
              
            <div class="answer-column">
              <div class="answer-label">意味</div>
              <div id="answerMeaning" class="vertical-answer-text"></div>
            </div>
          </div>
          
          <div class="button-group vertical">
            <button id="correctButton">正解した</button>
            <button id="wrongButton" class="danger">間違えた</button>
            <button id="backToTitleAfterRevealButton" class="secondary">タイトルに戻る</button>
          </div>
        </div>
      </section>

      <section id="completeScreen" class="card hidden">
        <h2>全部正解しました</h2>
        <p>今回の出題をすべて終えました。</p>
        <div class="button-group vertical">
          <button id="backToTitleFromCompleteButton">タイトルに戻る</button>
        </div>
      </section>

      <section id="historyScreen" class="card hidden">
        <h2>間違えた履歴</h2>
        <div id="historyList" class="history-list"></div>

        <div class="button-group vertical">
          <button id="backToTitleFromHistoryButton">タイトルに戻る</button>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
